name: SYNTROPY Shellcheck

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Run ShellCheck on all scripts
        run: |
          shellcheck --version
          shellcheck scripts/*.sh K-Scanner/scripts/*.sh || true
